# flyctl deploy (from this directory). Set secrets before first deploy — see DEPLOY.md
# App name must be globally unique on Fly.io — change if deploy says name taken
app = 'workscheduler-michaelkupfer97'

primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
